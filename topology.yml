name: kali-compare-topology

hosts:
  - name: kali
    base_box: 
      image: kali
      mgmt_user: debian
    flavor: standard.small

  - name: kali-0.5.0
    base_box: 
      image: kali-0.5.0
      mgmt_user: debian
    flavor: standard.small


routers:
  - name: router
    base_box:
      image: debian-10
      mgmt_user: debian
    flavor: standard.small

networks:
  - name: network
    cidr: 10.0.0.0/24

net_mappings:
    - host: image-test
      network: network
      ip: 10.0.0.10

router_mappings:
    - router: router
      network: network
      ip: 10.0.0.1

groups: []
